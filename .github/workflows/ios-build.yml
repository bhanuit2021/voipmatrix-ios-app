name: Build VoIPMatrix iOS

on:
push:
branches: [ "main", "master" ]

jobs:
build:
runs-on: macos-latest

```
steps:
- name: Checkout repository
  uses: actions/checkout@v4

- name: Show Xcode version
  run: xcodebuild -version

- name: Resolve packages
  run: xcodebuild -resolvePackageDependencies -workspace LinphoneApp.xcworkspace -scheme Linphone

- name: Build app
  run: |
    xcodebuild \
    -workspace LinphoneApp.xcworkspace \
    -scheme Linphone \
    -configuration Release \
    -sdk iphoneos \
    -destination 'generic/platform=iOS' \
    CODE_SIGNING_ALLOWED=NO \
    build

- name: Copy app
  run: |
    mkdir build
    cp -R ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app build/ || true

- name: Upload build
  uses: actions/upload-artifact@v4
  with:
    name: voipmatrix-ios-build
    path: build
```
