name: Build iOS

on: [push]

jobs:
build:
runs-on: macos-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Show Xcode version
    run: xcodebuild -version

  - name: Build app
    run: |
      xcodebuild \
      -workspace LinphoneApp.xcworkspace \
      -scheme Linphone \
      -configuration Release \
      -sdk iphoneos \
      -destination 'generic/platform=iOS' \
      CODE_SIGNING_ALLOWED=NO \
      build
```
