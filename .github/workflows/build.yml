name: Build VoIP Matrix iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace LinphoneApp.xcodeproj/project.xcworkspace \
            -scheme Linphone

      - name: Build (No Signing)
        run: |
          xcodebuild archive \
            -workspace LinphoneApp.xcodeproj/project.xcworkspace \
            -scheme Linphone \
            -configuration Release \
            -archivePath $RUNNER_TEMP/VoIPMatrix.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Export IPA (unsigned)
        run: |
          mkdir -p $RUNNER_TEMP/ipa
          cp -r $RUNNER_TEMP/VoIPMatrix.xcarchive/Products/Applications/VoIPMatrix.app \
            $RUNNER_TEMP/ipa/
          cd $RUNNER_TEMP/ipa
          zip -r VoIPMatrix-unsigned.ipa VoIPMatrix.app

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: VoIPMatrix-unsigned-ipa
          path: ${{ runner.temp }}/ipa/VoIPMatrix-unsigned.ipa
          retention-days: 7
